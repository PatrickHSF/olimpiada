<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Alunos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-body">
      <h3 class="text-center mb-4">🔍 Buscar Aluno por Email</h3>

      <div class="input-group mb-3">
        <input type="email" id="email" class="form-control" placeholder="Digite o email do aluno">
        <button class="btn btn-primary" onclick="buscarAluno()">Buscar</button>
      </div>

      <div id="resultado"></div>
    </div>
  </div>
</div>

<script>
let alunos = [];

// Carrega o JSON
fetch('alunos.json')
  .then(res => res.json())
  .then(data => alunos = data);

  function buscarAluno() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const resultadoDiv = document.getElementById('resultado');

  const encontrados = alunos.filter(aluno => {
    return aluno.EmailAluno &&
           aluno.EmailAluno.trim().toLowerCase() === email;
  });

  if (encontrados.length === 0) {
    resultadoDiv.innerHTML = `
      <div class="alert alert-danger">
        ❌ Nenhum aluno encontrado.
      </div>`;
    return;
  }

  let html = '';

  encontrados.forEach(aluno => {
    html += `
      <div class="card mt-3">
        <div class="card-body">
          <h5>${aluno.NomeAluno}</h5>
          <p><strong>Email:</strong> ${aluno.EmailAluno}</p>
          <p><strong>Token:</strong> ${aluno.EducationalToken}</p>
          <p><strong>Nascimento:</strong> ${aluno.DataNascimento}</p>
        </div>
      </div>
    `;
  });

  resultadoDiv.innerHTML = html;
}
</script>

</body>
</html>
